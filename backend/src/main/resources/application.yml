spring:
  application:
    name: chat-agent
  datasource:
    url: jdbc:sqlite:${SQLITE_PATH:${user.dir}/data/chatagent.db}?journal_mode=WAL&busy_timeout=5000
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:111.229.177.132}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,300ms,500ms,1s,2s,5s

app:
  agent:
    engine: ${APP_AGENT_ENGINE:langchain4j}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-min-256-bits-please-use-long-random-string}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  rate-limit:
    agent-requests-per-minute: ${RATE_LIMIT_AGENT_PER_MINUTE:30}
  admin:
    bootstrap-username: ${ADMIN_BOOTSTRAP_USERNAME:admin}
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD:admin}

dashscope:
  api-key: ${DASHSCOPE_API_KEY:}
  base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
  model: ${DASHSCOPE_MODEL:qwen3.5-flash}
  allowed-models:
    - tongyi-xiaomi-analysis-pro
    - tongyi-xiaomi-analysis-flash
    - qwen3.5-122b-a10b
    - qwen3.5-flash
    - qwen3.5-35b-a3b
    - qwen3.5-plus
    - qwen3.5-plus-2026-02-15
    - qwen3-max-2026-01-23
    - qwen3.5-27b
    - glm-5
  connect-timeout-ms: ${DASHSCOPE_CONNECT_TIMEOUT_MS:10000}
  read-timeout-ms: ${DASHSCOPE_READ_TIMEOUT_MS:120000}
  max-tokens: ${DASHSCOPE_MAX_TOKENS:4096}
  temperature: ${DASHSCOPE_TEMPERATURE:0.3}

agent:
  max-steps: ${AGENT_MAX_STEPS:8}
  max-tool-calls-per-turn: ${AGENT_MAX_TOOL_CALLS_PER_TURN:3}
  max-tool-calls-total: ${AGENT_MAX_TOOL_CALLS_TOTAL:6}
  max-tool-calls-per-tool: ${AGENT_MAX_TOOL_CALLS_PER_TOOL:3}
  tool-timeout-ms: ${AGENT_TOOL_TIMEOUT_MS:2000}
  langchain-token-streaming-enabled: ${AGENT_LANGCHAIN_TOKEN_STREAMING_ENABLED:true}

logging:
  level:
    com.chatagent: INFO
  pattern:
    console: "%d{ISO8601} %-5level [%thread] traceId=%X{traceId:-} %logger{36} - %msg%n"
