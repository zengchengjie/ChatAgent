spring:
  application:
    name: chat-agent
  datasource:
    url: jdbc:sqlite:${SQLITE_PATH:${user.dir}/data/chatagent.db}?journal_mode=WAL&busy_timeout=5000
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:111.229.177.132}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://111.229.177.132:4318/v1/traces

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-min-256-bits-please-use-long-random-string}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  admin:
    bootstrap-username: ${ADMIN_BOOTSTRAP_USERNAME:admin}
    bootstrap-password: ${ADMIN_BOOTSTRAP_PASSWORD:admin}

dashscope:
  api-key: ${DASHSCOPE_API_KEY:sk-36690807ab8f4a3f84bd816996e645c5}
  base-url: ${DASHSCOPE_BASE_URL:https://dashscope.cn-hangzhou.aliyuncs.com/compatible-mode/v1}
  model: ${DASHSCOPE_MODEL:qwen-turbo}
  allowed-models:
    - tongyi-xiaomi-analysis-pro
    - tongyi-xiaomi-analysis-flash
    - qwen3.5-122b-a10b
    - qwen-turbo
    - qwen3.5-flash
    - qwen3.5-35b-a3b
    - qwen3.5-plus
    - qwen3.5-plus-2026-02-15
    - qwen3-max-2026-01-23
    - qwen3.5-27b
    - glm-5
  connect-timeout-ms: ${DASHSCOPE_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${DASHSCOPE_READ_TIMEOUT_MS:30000}
  max-tokens: ${DASHSCOPE_MAX_TOKENS:4096}
  temperature: ${DASHSCOPE_TEMPERATURE:0.3}

ollama:
  base-url: ${OLLAMA_BASE_URL:http://localhost:11434/v1}
  model: ${OLLAMA_MODEL:deepseek-r1:1.5b}
  connect-timeout-ms: ${OLLAMA_CONNECT_TIMEOUT_MS:5000}
  read-timeout-ms: ${OLLAMA_READ_TIMEOUT_MS:10000}
  temperature: ${OLLAMA_TEMPERATURE:0.1}
  max-retries: ${OLLAMA_MAX_RETRIES:0}

it-support:
  chat-model: ${IT_SUPPORT_CHAT_MODEL:qwen-turbo}
  max-memory-messages: ${IT_SUPPORT_MAX_MEMORY_MESSAGES:20}
  rag-top-k: ${IT_SUPPORT_RAG_TOP_K:3}
  semantic-cache-similarity-threshold: ${IT_SUPPORT_CACHE_THRESHOLD:0.5}
  memory-enabled: ${IT_SUPPORT_MEMORY_ENABLED:true}
  memory-top-k: ${IT_SUPPORT_MEMORY_TOP_K:5}
  knowledge-base-path: ${IT_SUPPORT_KB_PATH:/Users/zengchengjie/IdeaProjects/ChatAgent/docs/it-knowledge-base.md}

logging:
  level:
    com.chatagent: INFO
  pattern:
    console: "%d{ISO8601} %-5level [%thread] %logger{36} - %msg%n"
